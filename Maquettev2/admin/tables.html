<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Plan de Salle - NATA Bar Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f5f5f5;
      color: #333;
      font-family: 'Manrope', sans-serif;
    }

    .admin-container {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background-color: #fff;
      border-right: 1px solid #e0e0e0;
      padding: 1.5rem;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
      width: 250px;
    }

    .sidebar-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: #e8621a;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 2rem;
    }

    .sidebar-menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .sidebar-menu a {
      color: #333;
      text-decoration: none;
      padding: 0.75rem 1rem;
      border-radius: 4px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 500;
    }

    .sidebar-menu a:hover,
    .sidebar-menu a.active {
      background-color: #e8621a;
      color: white;
    }

    .main-content {
      grid-column: 2;
      padding: 2rem;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
      color: #333;
    }

    .controls {
      background-color: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .toggle-switch {
      width: 50px;
      height: 28px;
      background-color: #ccc;
      border-radius: 14px;
      cursor: pointer;
      transition: background-color 0.3s;
      position: relative;
      border: none;
    }

    .toggle-switch.active {
      background-color: #22c55e;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      background-color: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.3s;
    }

    .toggle-switch.active::after {
      left: 24px;
    }

    .btn {
      background-color: #e8621a;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.9rem;
      transition: opacity 0.3s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .floor-plan-section {
      background-color: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 1.5rem;
      color: #333;
    }

    .floor-plan {
      position: relative;
      width: 100%;
      height: 420px;
      background: linear-gradient(170deg, #2a2420, #1f1a15);
      border: 1px solid #e8621a;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1rem;
      cursor: grab;
    }

    .floor-plan::before {
      content: "";
      position: absolute;
      inset: 1rem;
      border: 2px dashed rgba(232, 98, 26, 0.15);
      border-radius: 4px;
      pointer-events: none;
      z-index: 1;
    }

    .floor-plan.dragging {
      cursor: grabbing;
    }

    .floor-plan-content {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .table-draggable {
      appearance: none;
      -webkit-appearance: none;
      position: absolute;
      left: var(--x, 50%);
      top: var(--y, 50%);
      width: var(--w, 60px);
      height: var(--h, 60px);
      transform: translate(-50%, -50%);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0.35rem;
      color: #f8fafc;
      font: inherit;
      font-weight: 700;
      font-size: 0.75rem;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 0.2rem;
      text-align: center;
      cursor: grab;
      z-index: 2;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      line-height: 1.2;
    }

    /* Chaises pour tables draggables */
    .table-draggable::before,
    .table-draggable::after {
      content: "";
      position: absolute;
      top: 8%;
      bottom: 8%;
      width: 8px;
      background: radial-gradient(circle, #d9dde2 0 3px, transparent 4px) repeat-y;
      pointer-events: none;
    }

    .table-draggable::before {
      left: -6px;
      background-size: 8px calc(100% / var(--chairs-left, 2));
    }

    .table-draggable::after {
      right: -6px;
      background-size: 8px calc(100% / var(--chairs-right, 2));
    }

    .table-draggable {
      background-color: #22c55e;
    }

    .table-draggable:hover {
      transform: translate(-50%, -50%) scale(1.05);
    }

    .table-draggable.dragging {
      opacity: 0.6;
      cursor: grabbing;
    }

    .table-draggable.selected {
      border-color: #e8621a;
      box-shadow: 0 0 0 3px rgba(232, 98, 26, 0.3);
      transform: translate(-50%, -50%) scale(1.08);
    }

    .table-draggable.reserved {
      background: linear-gradient(145deg, #dc5151, #c14545);
    }

    .table-draggable.pending {
      background: linear-gradient(145deg, #f59e0b, #d97706);
    }

    .add-table-form {
      background-color: #f5f5f5;
      padding: 1.5rem;
      border-radius: 4px;
      margin-top: 1.5rem;
      border: 1px solid #e0e0e0;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select {
      padding: 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-family: inherit;
    }

    .saved-layouts {
      background-color: #f5f5f5;
      padding: 1.5rem;
      border-radius: 4px;
      margin-top: 1.5rem;
      border: 1px solid #e0e0e0;
    }

    .layouts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .layout-card {
      background-color: white;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .layout-card:hover {
      border-color: #e8621a;
      box-shadow: 0 2px 8px rgba(232, 98, 26, 0.1);
    }

    .layout-name {
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .layout-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      font-size: 0.8rem;
    }

    .btn-small {
      flex: 1;
      padding: 0.4rem 0.6rem;
      background-color: #e8621a;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.3s;
    }

    .btn-small:hover {
      opacity: 0.9;
    }

    .btn-small.danger {
      background-color: #ef4444;
    }

    @media (max-width: 768px) {
      .admin-container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
        width: 100%;
      }

      .main-content {
        grid-column: 1;
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <aside class="sidebar">
      <div class="sidebar-logo">NATA</div>
      <nav class="sidebar-menu">
        <a href="index.html">📊 Dashboard</a>
        <a href="reservations.html">📋 Réservations</a>
        <a href="tables.html" class="active">🪑 Tables</a>
        <a href="menu.html">🍽️ Menu</a>
        <a href="actualites.html">📰 Actualités</a>
        <a href="../login.html" style="color: #e8621a; border: 2px solid #e8621a; margin-top: 2rem;">🚪 Déconnexion</a>
      </nav>
    </aside>

    <main class="main-content">
      <h1 class="page-title">Gestion du Plan de Salle</h1>

      <!-- Controls -->
      <div class="controls">
        <div class="control-group">
          <label style="font-weight: 600;">Terrasse active:</label>
          <button class="toggle-switch active" onclick="toggleTerrasse(this)"></button>
        </div>
        <button class="btn" onclick="saveLayout()">💾 Sauvegarder Disposition</button>
        <button class="btn" onclick="addTable()">➕ Ajouter Table</button>
      </div>

      <!-- Intérieur -->
      <div class="floor-plan-section">
        <h2 class="section-title">🏠 Intérieur</h2>
        <div class="floor-plan" id="interiorFloorPlan">
          <div class="floor-plan-content">
            <button type="button" class="table-draggable" draggable="true" data-table="T-1" data-zone="interior" style="--x: 15%; --y: 20%; --w: 60px; --h: 60px; --chairs-left: 2; --chairs-right: 2;">T-1<br>4p</button>
            <button type="button" class="table-draggable" draggable="true" data-table="T-2" data-zone="interior" style="--x: 15%; --y: 50%; --w: 50px; --h: 50px; --chairs-left: 1; --chairs-right: 1;">T-2<br>2p</button>
            <button type="button" class="table-draggable reserved" draggable="true" data-table="T-3" data-zone="interior" style="--x: 15%; --y: 80%; --w: 70px; --h: 70px; --chairs-left: 3; --chairs-right: 3;">T-3<br>6p</button>
            <button type="button" class="table-draggable" draggable="true" data-table="T-4" data-zone="interior" style="--x: 45%; --y: 25%; --w: 60px; --h: 60px; --chairs-left: 2; --chairs-right: 2;">T-4<br>4p</button>
            <button type="button" class="table-draggable pending" draggable="true" data-table="T-5" data-zone="interior" style="--x: 45%; --y: 60%; --w: 50px; --h: 50px; --chairs-left: 1; --chairs-right: 1;">T-5<br>2p</button>
            <button type="button" class="table-draggable" draggable="true" data-table="T-6" data-zone="interior" style="--x: 45%; --y: 85%; --w: 60px; --h: 60px; --chairs-left: 2; --chairs-right: 2;">T-6<br>4p</button>
            <button type="button" class="table-draggable" draggable="true" data-table="T-7" data-zone="interior" style="--x: 75%; --y: 35%; --w: 80px; --h: 80px; --chairs-left: 4; --chairs-right: 4;">T-7<br>8p</button>
          </div>
        </div>
      </div>

      <!-- Terrasse -->
      <div class="floor-plan-section" id="terrarceSection">
        <h2 class="section-title">🌳 Terrasse</h2>
        <div class="floor-plan" id="terrarceFloorPlan">
          <div class="floor-plan-content">
            <button type="button" class="table-draggable" draggable="true" data-table="E-1" data-zone="terrasse" style="--x: 20%; --y: 40%; --w: 50px; --h: 50px; --chairs-left: 1; --chairs-right: 1;">E-1<br>2p</button>
            <button type="button" class="table-draggable" draggable="true" data-table="E-2" data-zone="terrasse" style="--x: 50%; --y: 35%; --w: 60px; --h: 60px; --chairs-left: 2; --chairs-right: 2;">E-2<br>4p</button>
            <button type="button" class="table-draggable reserved" draggable="true" data-table="E-3" data-zone="terrasse" style="--x: 50%; --y: 70%; --w: 60px; --h: 60px; --chairs-left: 2; --chairs-right: 2;">E-3<br>4p</button>
            <button type="button" class="table-draggable" draggable="true" data-table="E-4" data-zone="terrasse" style="--x: 80%; --y: 50%; --w: 70px; --h: 70px; --chairs-left: 3; --chairs-right: 3;">E-4<br>6p</button>
          </div>
        </div>
      </div>

      <!-- Ajouter Table -->
      <div class="floor-plan-section">
        <h3 class="section-title">Ajouter une Table</h3>
        <div class="add-table-form">
          <div class="form-row">
            <div class="form-group">
              <label>Code table</label>
              <input type="text" id="tableCode" placeholder="Ex: T-7" value="T-7">
            </div>
            <div class="form-group">
              <label>Nombre de places</label>
              <input type="number" id="tableSeats" placeholder="Ex: 4" value="4" min="1" max="12">
            </div>
            <div class="form-group">
              <label>Zone</label>
              <select id="tableZone">
                <option value="interior">Intérieur</option>
                <option value="terrasse">Terrasse</option>
              </select>
            </div>
          </div>
          <button class="btn" onclick="createNewTable()">Créer la table</button>
        </div>
      </div>

      <!-- Saved Layouts -->
      <div class="floor-plan-section">
        <h3 class="section-title">Dispositions Sauvegardées</h3>
        <div class="saved-layouts">
          <div class="layouts-grid">
            <div class="layout-card">
              <div class="layout-name">Normal</div>
              <small style="color: #666;">Défaut</small>
              <div class="layout-actions">
                <button class="btn-small" onclick="loadLayout('Normal')">Charger</button>
                <button class="btn-small danger" onclick="deleteLayout('Normal')">Suppr</button>
              </div>
            </div>
            <div class="layout-card">
              <div class="layout-name">Événement</div>
              <small style="color: #666;">12 tables</small>
              <div class="layout-actions">
                <button class="btn-small" onclick="loadLayout('Événement')">Charger</button>
                <button class="btn-small danger" onclick="deleteLayout('Événement')">Suppr</button>
              </div>
            </div>
            <div class="layout-card">
              <div class="layout-name">Hiver</div>
              <small style="color: #666;">Sans terrasse</small>
              <div class="layout-actions">
                <button class="btn-small" onclick="loadLayout('Hiver')">Charger</button>
                <button class="btn-small danger" onclick="deleteLayout('Hiver')">Suppr</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Drag and drop functionality
    let draggedElement = null;

    document.querySelectorAll('.table-draggable').forEach(table => {
      table.addEventListener('dragstart', () => {
        draggedElement = table;
        table.classList.add('dragging');
      });

      table.addEventListener('dragend', () => {
        table.classList.remove('dragging');
      });

      table.addEventListener('click', () => {
        document.querySelectorAll('.table-draggable').forEach(t => t.classList.remove('selected'));
        table.classList.add('selected');
      });
    });

    function toggleTerrasse(btn) {
      btn.classList.toggle('active');
      const terrarceSection = document.getElementById('terrarceSection');
      terrarceSection.style.display = btn.classList.contains('active') ? 'block' : 'none';
    }

    function saveLayout() {
      const name = prompt('Nom de la disposition:', 'Ma disposition');
      if (name) {
        alert(`Disposition "${name}" sauvegardée !`);
      }
    }

    function addTable() {
      alert('Ouvrir le formulaire pour ajouter une table (scoré vers le bas)');
    }

    function createNewTable() {
      const code = document.getElementById('tableCode').value;
      const seats = document.getElementById('tableSeats').value;
      const zone = document.getElementById('tableZone').value;
      alert(`Table ${code} (${seats} places) ajoutée à la zone ${zone}!`);
    }

    function loadLayout(name) {
      alert(`Disposition "${name}" chargée !`);
    }

    function deleteLayout(name) {
      if (confirm(`Supprimer la disposition "${name}" ?`)) {
        alert(`Disposition "${name}" supprimée !`);
      }
    }
  </script>
</body>
</html>
