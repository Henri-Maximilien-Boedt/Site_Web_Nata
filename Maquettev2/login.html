<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin - NATA Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-main: #12100e;
      --bg-card: #1c1916;
      --bg-input: #252119;
      --text-primary: #ede0c4;
      --text-secondary: #a89880;
      --accent: #e8621a;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-primary);
      font-family: 'Manrope', sans-serif;
      font-weight: 400;
      line-height: 1.6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .login-container {
      background-color: var(--bg-card);
      border: 1px solid var(--bg-input);
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      background-color: var(--bg-input);
      border: 1px solid rgba(168, 152, 128, 0.3);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: inherit;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(232, 98, 26, 0.1);
    }

    .form-group input::placeholder {
      color: rgba(168, 152, 128, 0.5);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 700;
      cursor: pointer;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: opacity 0.3s;
      margin-bottom: 1.5rem;
    }

    .btn-login:hover {
      opacity: 0.9;
    }

    .forgot-password {
      text-align: center;
      margin-top: 1rem;
    }

    .forgot-password a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .forgot-password a:hover {
      color: #ff7a38;
    }

    .back-link {
      margin-top: 2rem;
      text-align: center;
    }

    .back-link a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .back-link a:hover {
      color: var(--accent);
    }

    .error-message {
      background-color: rgba(239, 68, 68, 0.1);
      border-left: 4px solid #ef4444;
      color: #fca5a5;
      padding: 0.75rem;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 0.9rem;
    }

    .error-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1 class="logo">NATA</h1>
    <p class="subtitle">Espace Admin</p>

    <div class="error-message" id="errorMessage"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="admin@natabar.be" required>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-login">Connexion</button>
    </form>

    <div class="back-link">
      <a href="index.html">← Retour au site</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');

      if (email === 'admin@natabar.be' && password === 'password') {
        alert('Connexion réussie ! Redirection vers le dashboard...');
        window.location.href = 'admin/index.html';
      } else {
        errorMessage.textContent = 'Email ou mot de passe incorrect.';
        errorMessage.classList.add('show');
      }
    });
  </script>
</body>
</html>
